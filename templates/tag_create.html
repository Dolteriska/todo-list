{% extends 'base.html' %}
{% load crispy_forms_filters %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-4">
    <h2>Create New Tag</h2>

    <form method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}

        <button type="submit" class="btn btn-primary mt-3">Save Tag</button>
    </form>
</div>
{% endblock %}
